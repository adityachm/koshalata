<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <!-- Dark background -->
  <rect width="300" height="200" fill="#111111"/>

  <!-- Decorative K - main vertical stroke -->
  <path d="M115 48 L115 112" stroke="#C0C0C0" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- K upper diagonal with swoosh -->
  <path d="M115 78 Q128 68 142 55 Q150 48 158 44 Q162 42 164 43 Q166 44 164 47 Q160 51 150 56 Q138 63 128 72 L115 82" stroke="#C0C0C0" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- K lower diagonal -->
  <path d="M118 82 Q130 90 142 102 Q152 112 160 120" stroke="#C0C0C0" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- Swoosh under the K - elegant curved line -->
  <path d="M100 118 Q120 122 140 118 Q155 115 165 110 Q172 106 175 102" stroke="#C0C0C0" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Second swoosh line -->
  <path d="M102 123 Q122 128 143 123 Q160 119 172 113" stroke="#C0C0C0" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Decorative loop on K top - script style -->
  <path d="M115 48 Q110 42 112 38 Q114 34 118 36 Q121 38 120 44 Q119 48 115 50" stroke="#C0C0C0" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- KAIVORA text -->
  <text x="150" y="152" font-family="Garamond, 'Times New Roman', serif" font-size="22" font-weight="400" letter-spacing="8" fill="#C0C0C0" text-anchor="middle" font-variant="normal">KAIVORA</text>

  <!-- Wear Your Signature tagline -->
  <text x="150" y="172" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-style="italic" fill="#9A9A9A" text-anchor="middle" letter-spacing="1">Wear Your Signature</text>
</svg>
